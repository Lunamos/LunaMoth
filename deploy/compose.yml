# LunaMoth — one-click server deploy (plan Track E).
#
#   cd deploy && docker compose up -d
#
# Builds the image from deploy/Dockerfile (which installs the wheel emitted by
# scripts/build-wheel.sh — run that FIRST so dist/*.whl exists). Once a release
# image is published you can swap `build:` for `image: ghcr.io/lunamos/lunamoth:latest`.
#
# Bound to 0.0.0.0 inside the container. Put a TLS reverse proxy (Caddy /
# cloudflared, WS upgrade enabled) in front for any non-loopback access — see
# the "Run on a server" section of the README. Mirrors reference/AstrBot/compose.yml.
services:
  lunamoth:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: lunamoth:latest
    container_name: lunamoth
    restart: always
    security_opt:
      - no-new-privileges:true
    ports:
      - "6180:6180" # LunaMoth desktop UI (HTTP)
      - "6181:6181" # WS gateway (http+1; your reverse proxy path-routes /hub,/chara/* here)
    environment:
      - TZ=Asia/Shanghai
      # The entrypoint generates an access token if LUNAMOTH_TOKEN is unset and
      # prints it in the logs (`docker compose logs lunamoth`) — read it to build
      # your bookmark URL. To PIN a stable token (and a fixed bookmark URL), set it:
      # - LUNAMOTH_TOKEN=your-long-random-token
      # - LUNAMOTH_PORT=6180
    volumes:
      # Sessions, cards and config — the one thing that must survive a re-deploy.
      - ./data:/root/.lunamoth
      - /etc/localtime:/etc/localtime:ro
